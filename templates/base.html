<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}APK Signer{% endblock %}</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark cyber-nav sticky-top">
  <div class="container-fluid px-4">
    <a class="navbar-brand cyber-brand" href="/">
      <i class="fa-solid fa-shield-halved me-2"></i>APK<span class="text-accent">SIGNER</span>
    </a>
    <span class="badge rounded-pill cyber-badge d-none d-md-inline-block">
      <i class="fa-solid fa-circle text-success blink me-1"></i>ENGINE ONLINE
    </span>
  </div>
</nav>

<div class="container-fluid px-4 py-4">
  {% block content %}{% endblock %}
</div>

<footer class="text-center py-4 text-muted small">
  APK Signer &mdash; sign only APKs you own or have explicit permission to distribute.
</footer>

<div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
